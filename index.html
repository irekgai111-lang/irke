<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İrke — Kemancı & Vokalist</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:'Inter',Arial,sans-serif; min-height:100vh; color:#fff;
    display:flex; align-items:center; justify-content:center; padding:34px 18px;
    background:#0a0612; overflow-x:hidden;
  }
  /* animated aurora background */
  .aurora{ position:fixed; inset:-30%; z-index:0; filter:blur(70px); opacity:.55;
    background:
      radial-gradient(40% 40% at 25% 30%, #b14bff 0%, transparent 60%),
      radial-gradient(45% 45% at 80% 25%, #ff5db1 0%, transparent 60%),
      radial-gradient(50% 50% at 60% 85%, #6a3bff 0%, transparent 60%),
      radial-gradient(40% 40% at 15% 80%, #00d4ff 0%, transparent 60%);
    animation:drift 16s ease-in-out infinite alternate; }
  @keyframes drift{ 0%{transform:scale(1) translate(0,0) rotate(0deg);}
    100%{transform:scale(1.25) translate(4%,-3%) rotate(8deg);} }

  .card{ position:relative; z-index:1; width:100%; max-width:420px; text-align:center;
    padding:30px 24px 32px; border-radius:28px;
    background:rgba(255,255,255,.07); backdrop-filter:blur(22px) saturate(140%);
    -webkit-backdrop-filter:blur(22px) saturate(140%);
    border:1px solid rgba(255,255,255,.22);
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.35); }

  .eyebrow{ letter-spacing:.4em; font-size:10.5px; text-transform:uppercase;
    color:#ffd9f4; opacity:.9; margin-bottom:16px; }

  /* 3D glass photo */
  .frame{ width:235px; margin:0 auto 22px; border-radius:20px; padding:6px;
    background:linear-gradient(135deg,rgba(255,255,255,.6),rgba(255,255,255,.05));
    box-shadow:0 22px 50px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.4);
    transform:perspective(1000px) rotateY(-7deg) rotateX(4deg);
    transition:transform .5s ease; }
  .frame:hover{ transform:perspective(1000px) rotateY(0deg) rotateX(0deg); }
  .frame img{ display:block; width:100%; border-radius:15px; }

  /* iridescent 3D name */
  .name{ position:relative; display:inline-block; font-weight:900; font-size:64px;
    line-height:1; margin:6px 0 4px; letter-spacing:.01em;
    background:linear-gradient(95deg,#ff8fd6,#c08bff 35%,#7ad6ff 60%,#ffd1f0);
    background-size:240% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 6px rgba(177,75,255,.45);
    filter:drop-shadow(0 0 14px rgba(255,93,177,.5));
    animation:hue 6s linear infinite; }
  @keyframes hue{ 0%{background-position:0 0;} 100%{background-position:240% 0;} }
  .name::after{ content:"İrke"; position:absolute; inset:0;
    background:linear-gradient(110deg,transparent 38%,rgba(255,255,255,.95) 50%,transparent 62%);
    background-size:240% 100%; -webkit-background-clip:text; background-clip:text;
    color:transparent; animation:shine 3.4s linear infinite; }
  @keyframes shine{ 0%{background-position:-240% 0;} 100%{background-position:240% 0;} }

  .role{ font-size:13.5px; letter-spacing:.34em; text-transform:uppercase;
    color:#f0e3ff; margin-bottom:8px; }
  .tagline{ font-size:14.5px; color:rgba(255,255,255,.78); margin:10px 6px 22px; line-height:1.5; }

  .btn{ display:inline-flex; align-items:center; gap:9px; text-decoration:none;
    font-weight:700; font-size:15px; color:#fff; padding:14px 28px; border-radius:40px;
    background:linear-gradient(95deg,#ff5db1,#b14bff 55%,#6a3bff);
    box-shadow:0 14px 32px rgba(177,75,255,.5), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .2s, box-shadow .2s; }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 20px 40px rgba(177,75,255,.65); }
  .handle{ margin-top:15px; font-size:13px; letter-spacing:.12em; color:#ffd9f4; }
  .note{ margin-top:6px; font-size:11px; color:rgba(255,255,255,.5); }
</style>

<style id="alive-fx">
  .frame{ position:relative; overflow:hidden; }
  .frame img{ filter:brightness(1.05) saturate(1.12) contrast(1.06); will-change:transform,filter;
    animation:wakePop 1.5s cubic-bezier(.22,.7,.25,1) 2s both, breathe 9s ease-in-out 3.6s infinite; }
  @keyframes wakePop{
    0%{ transform:scale(1); filter:brightness(1.05) saturate(1.12) contrast(1.06); }
    45%{ transform:scale(1.045); filter:brightness(1.16) saturate(1.26) contrast(1.12); }
    100%{ transform:scale(1.012); filter:brightness(1.07) saturate(1.16) contrast(1.07); } }
  @keyframes breathe{ 0%,100%{ transform:scale(1.012); } 50%{ transform:scale(1.045); } }
  .frame .glint{ position:absolute; inset:0; pointer-events:none; mix-blend-mode:screen;
    background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.65) 50%,transparent 58%);
    transform:translateX(-130%); opacity:0; animation:glint 1.6s ease-in-out 2s 1 both; }
  @keyframes glint{ 0%{transform:translateX(-130%);opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateX(130%);opacity:0;} }
  .frame .spark{ position:absolute; top:35%; left:45%; width:18px; height:18px; pointer-events:none;
    background:radial-gradient(circle,#fff 0 2px,rgba(255,255,255,.6) 3px,transparent 7px);
    filter:drop-shadow(0 0 8px #fff) drop-shadow(0 0 16px #cfe8ff); opacity:0;
    animation:spark 1.6s ease-out 2.45s 1 both; }
  @keyframes spark{ 0%{opacity:0;transform:scale(.2) rotate(0);} 35%{opacity:1;transform:scale(1.15) rotate(25deg);}
    70%{opacity:0;transform:scale(.5) rotate(45deg);} 100%{opacity:0;} }
  @media (prefers-reduced-motion:reduce){ .frame img,.frame .glint,.frame .spark{ animation:none; } }
</style>
</head>
